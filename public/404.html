<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages fallback for HashRouter.
    // When a user directly visits /base/some/path, GitHub Pages serves this 404.html,
    // which redirects to /base/#/some/path so the client-side router can take over.
    (function () {
      var base = '/machine-learning-interactive-web/';
      var path = window.location.pathname;

      if (path.startsWith(base)) {
        path = path.slice(base.length);
      }

      // Avoid infinite redirects if the path already contains the base in hash
      var redirectTo = base + '#/' + path + window.location.search + window.location.hash;
      window.location.replace(redirectTo);
    })();
  </script>
</head>
<body>
  <p>正在跳转...</p>
</body>
</html>
